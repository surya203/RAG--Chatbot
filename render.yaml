# Render Blueprint — backend API only.
# Frontend deploys separately on Vercel (see README deployment section).
#
# After deploy: set CORS_ORIGINS to your Vercel URL in the Render dashboard.

services:
  - type: web
    name: rag-chatbot-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: rag-chatbot-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: rag-chatbot-db
    plan: free
    databaseName: rag_chatbot
    user: rag_chatbot
