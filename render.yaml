# Render Blueprint — API only (database hosted on Neon).
# Frontend deploys separately on Vercel.
#
# Set DATABASE_URL to your Neon connection string (postgresql+psycopg://...).
# After Vercel deploy: set CORS_ORIGINS to your Vercel URL.

services:
  - type: web
    name: rag-chatbot-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
